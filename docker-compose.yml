version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: evalit-mysql
    restart: always
    environment:
      MYSQL_DATABASE: evalit
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evalit-server
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # Use 'db' as the host instead of localhost, so Docker routes it correctly
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/evalit?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # Pull these from the .env file on the VM
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - SPRING_MAIL_USERNAME=${SPRING_MAIL_USERNAME}
      - SPRING_MAIL_PASSWORD=${SPRING_MAIL_PASSWORD}
      - SERVER_IP_WITH_NIP=${SERVER_IP_WITH_NIP}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}

volumes:
  db_data:
